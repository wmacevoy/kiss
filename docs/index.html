<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KISS Java Playground</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1e1e2e;--surface:#313244;--overlay:#45475a;--text:#cdd6f4;--subtext:#a6adc8;--green:#a6e3a1;--red:#f38ba8;--yellow:#f9e2af;--blue:#89b4fa;--mauve:#cba6f7;--teal:#94e2d5}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--overlay)}
header h1{font-size:16px;color:var(--mauve);white-space:nowrap}
header h1 span{color:var(--subtext);font-weight:normal;font-size:13px}
select,button{background:var(--overlay);color:var(--text);border:1px solid transparent;padding:5px 10px;border-radius:4px;font-size:13px;cursor:pointer}
select:hover,button:hover{border-color:var(--blue)}
button.primary{background:var(--blue);color:var(--bg);font-weight:600}
button.primary:hover{opacity:0.9}
button.danger{color:var(--red)}
button.warn{background:var(--yellow);color:var(--bg)}
.spacer{flex:1}
main{flex:1;display:flex;overflow:hidden}
.editor-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--overlay)}
.file-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--overlay);overflow-x:auto}
.file-tab{padding:6px 14px;font-size:13px;cursor:pointer;border-right:1px solid var(--overlay);white-space:nowrap;color:var(--subtext);display:flex;align-items:center;gap:6px}
.file-tab.active{background:var(--bg);color:var(--text)}
.file-tab .close{font-size:11px;opacity:0.5;padding:0 2px}
.file-tab .close:hover{opacity:1;color:var(--red)}
.file-tab.add{color:var(--blue);font-weight:bold;padding:6px 10px}
#editor{flex:1;background:var(--bg);color:var(--text);border:none;resize:none;padding:12px;font-family:'JetBrains Mono',Consolas,'Courier New',monospace;font-size:14px;line-height:1.5;tab-size:4;outline:none;overflow:auto}
.output-panel{width:40%;min-width:280px;display:flex;flex-direction:column}
.panel-header{padding:6px 12px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--subtext);background:var(--surface);border-bottom:1px solid var(--overlay)}
.input-section{border-bottom:1px solid var(--overlay)}
#input{background:var(--bg);color:var(--text);border:none;resize:none;padding:8px 12px;font-family:'JetBrains Mono',Consolas,'Courier New',monospace;font-size:13px;line-height:1.4;height:80px;width:100%;outline:none}
.console-section{flex:1;display:flex;flex-direction:column;overflow:hidden}
#console{flex:1;overflow:auto;padding:8px 12px;font-family:'JetBrains Mono',Consolas,'Courier New',monospace;font-size:13px;line-height:1.4;white-space:pre-wrap;word-break:break-all}
#console .err{color:var(--red)}
#console .info{color:var(--subtext)}
#console .ok{color:var(--green)}
#console .warn{color:var(--yellow)}
footer{background:var(--surface);padding:8px 16px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--overlay)}
#status{font-size:13px;color:var(--subtext)}
.loading-overlay{position:fixed;inset:0;background:rgba(30,30,46,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.loading-overlay h2{color:var(--mauve);margin-bottom:12px}
.loading-overlay p{color:var(--subtext);font-size:14px}
.spinner{width:40px;height:40px;border:3px solid var(--overlay);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
@media(max-width:768px){
  main{flex-direction:column}
  .editor-panel{border-right:none;border-bottom:1px solid var(--overlay);flex:none;height:50%}
  .output-panel{width:100%;flex:1}
}
</style>
</head>
<body>

<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  <h2>KISS Java Playground</h2>
  <p id="load-status">Loading CheerpJ runtime...</p>
</div>

<header>
  <h1>KISS Java <span>Playground</span></h1>
  <select id="examples" title="Load an example">
    <option value="">-- Examples --</option>
  </select>
  <select id="saves" title="Load saved work">
    <option value="">-- My Saves --</option>
  </select>
  <button id="save-btn">Save As...</button>
  <button id="delete-btn" class="danger">Delete</button>
  <span class="spacer"></span>
  <select id="run-mode">
    <option value="all">Test & Run</option>
    <option value="test">Tests Only</option>
    <option value="run">Run Only</option>
  </select>
  <button id="run-btn" class="primary">Go</button>
  <button id="stop-btn" class="danger hidden">Stop</button>
</header>

<main>
  <div class="editor-panel">
    <div class="file-tabs" id="file-tabs"></div>
    <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
  </div>
  <div class="output-panel">
    <div class="input-section">
      <div class="panel-header">Input (stdin)</div>
      <textarea id="input" placeholder="Enter input for your program here..."></textarea>
    </div>
    <div class="console-section">
      <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center">
        <span>Console</span>
        <button id="clear-btn" style="padding:2px 8px;font-size:11px">Clear</button>
      </div>
      <pre id="console"></pre>
    </div>
  </div>
</main>

<footer>
  <span id="status">Initializing...</span>
</footer>

<script>
// ── Examples ──────────────────────────────────────────────

};

// ── State ─────────────────────────────────────────────────
let files = {};
let activeFile = "App.java";
let running = false;
let cjReady = false;

const editor = document.getElementById("editor");
const consoleEl = document.getElementById("console");
const inputEl = document.getElementById("input");
const statusEl = document.getElementById("status");
const tabsEl = document.getElementById("file-tabs");
const examplesEl = document.getElementById("examples");
const savesEl = document.getElementById("saves");
const loadingEl = document.getElementById("loading");
const loadStatusEl = document.getElementById("load-status");

// ── Console output ────────────────────────────────────────
function conWrite(text, cls) {
    const span = document.createElement("span");
    if (cls) span.className = cls;
    span.textContent = text + "\n";
    consoleEl.appendChild(span);
    consoleEl.scrollTop = consoleEl.scrollHeight;
}
function conClear() { consoleEl.textContent = ""; }

// Capture Java stdout/stderr from CheerpJ (goes to console.log)
let capturing = false;
const _log = console.log;
const _error = console.error;
const _warn = console.warn;

console.log = function(...args) {
    if (capturing) {
        const msg = args.map(a => typeof a === "object" ? JSON.stringify(a) : String(a)).join(" ");
        // Filter CheerpJ internal messages
        if (!msg.startsWith("[CheerpJ]")) conWrite(msg);
    }
    _log.apply(console, args);
};
console.error = function(...args) {
    if (capturing) {
        const msg = args.map(a => typeof a === "object" ? JSON.stringify(a) : String(a)).join(" ");
        if (!msg.startsWith("[CheerpJ]")) conWrite(msg, "err");
    }
    _error.apply(console, args);
};

// ── File tabs ─────────────────────────────────────────────
function renderTabs() {
    tabsEl.innerHTML = "";
    const names = Object.keys(files);
    names.forEach(name => {
        const tab = document.createElement("div");
        tab.className = "file-tab" + (name === activeFile ? " active" : "");
        tab.innerHTML = name;
        if (names.length > 1) {
            const close = document.createElement("span");
            close.className = "close";
            close.textContent = "\u00d7";
            close.onclick = (e) => { e.stopPropagation(); deleteFile(name); };
            tab.appendChild(close);
        }
        tab.onclick = () => switchFile(name);
        tabsEl.appendChild(tab);
    });
    const addTab = document.createElement("div");
    addTab.className = "file-tab add";
    addTab.textContent = "+";
    addTab.title = "Add file";
    addTab.onclick = addFile;
    tabsEl.appendChild(addTab);
}

function switchFile(name) {
    files[activeFile] = editor.value;
    activeFile = name;
    editor.value = files[name] || "";
    renderTabs();
    autoSave();
}

function addFile() {
    const name = prompt("File name (e.g. Helper.java):");
    if (!name || !name.endsWith(".java")) return;
    if (files[name]) { switchFile(name); return; }
    files[activeFile] = editor.value;
    files[name] = "import static kiss.API.*;\n\nclass " +
        name.replace(".java","") + " {\n    \n}\n";
    activeFile = name;
    editor.value = files[name];
    renderTabs();
    autoSave();
}

function deleteFile(name) {
    if (Object.keys(files).length <= 1) return;
    delete files[name];
    if (activeFile === name) {
        activeFile = Object.keys(files)[0];
        editor.value = files[activeFile];
    }
    renderTabs();
    autoSave();
}

// ── Examples ──────────────────────────────────────────────
function populateExamples() {
    Object.keys(EXAMPLES).forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        examplesEl.appendChild(opt);
    });
}

function loadExample(name) {
    const ex = EXAMPLES[name];
    if (!ex) return;
    files = {};
    Object.keys(ex.files).forEach(f => files[f] = ex.files[f]);
    activeFile = files["App.java"] !== undefined ? "App.java" : Object.keys(files)[0];
    editor.value = files[activeFile];
    inputEl.value = ex.input || "";
    renderTabs();
    autoSave();
    updateRunModes();
    conWrite("Loaded example: " + name, "info");
}

examplesEl.onchange = function() {
    if (this.value) { loadExample(this.value); this.value = ""; }
};

// ── Save / Load ───────────────────────────────────────────
const SAVE_KEY = "kiss-playground-saves";
const CURRENT_KEY = "kiss-playground-current";

function getSaves() {
    try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch(e) { return {}; }
}

function populateSaves() {
    savesEl.innerHTML = '<option value="">-- My Saves --</option>';
    const saves = getSaves();
    Object.keys(saves).sort().forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        savesEl.appendChild(opt);
    });
}

function autoSave() {
    files[activeFile] = editor.value;
    const state = { files: {...files}, activeFile, input: inputEl.value };
    localStorage.setItem(CURRENT_KEY, JSON.stringify(state));
}

function loadState() {
    try {
        const state = JSON.parse(localStorage.getItem(CURRENT_KEY));
        if (state && state.files && Object.keys(state.files).length > 0) {
            files = state.files;
            activeFile = state.activeFile || Object.keys(files)[0];
            editor.value = files[activeFile] || "";
            inputEl.value = state.input || "";
            renderTabs();
            return true;
        }
    } catch(e) {}
    return false;
}

document.getElementById("save-btn").onclick = function() {
    const name = prompt("Save name:");
    if (!name) return;
    files[activeFile] = editor.value;
    const saves = getSaves();
    saves[name] = { files: {...files}, input: inputEl.value };
    localStorage.setItem(SAVE_KEY, JSON.stringify(saves));
    populateSaves();
    conWrite("Saved: " + name, "info");
};

document.getElementById("delete-btn").onclick = function() {
    const saves = getSaves();
    const names = Object.keys(saves);
    if (names.length === 0) { conWrite("No saves to delete.", "info"); return; }
    const name = prompt("Delete which save?\n" + names.join(", "));
    if (!name || !saves[name]) return;
    delete saves[name];
    localStorage.setItem(SAVE_KEY, JSON.stringify(saves));
    populateSaves();
    conWrite("Deleted: " + name, "info");
};

savesEl.onchange = function() {
    if (!this.value) return;
    const saves = getSaves();
    const save = saves[this.value];
    if (!save) return;
    files = {...save.files};
    activeFile = Object.keys(files)[0];
    editor.value = files[activeFile] || "";
    inputEl.value = save.input || "";
    renderTabs();
    autoSave();
    updateRunModes();
    conWrite("Loaded: " + this.value, "info");
    this.value = "";
};

// ── Test method parsing ───────────────────────────────────
const runModeEl = document.getElementById("run-mode");

function parseTestMethods() {
    const tests = [];
    for (const [filename, content] of Object.entries(files)) {
        // Track class declarations by position
        const classes = [];
        const classRe = /\bclass\s+(\w+)/g;
        let cm;
        while ((cm = classRe.exec(content)) !== null) {
            classes.push({ name: cm[1], pos: cm.index });
        }
        // Find testXXX() methods
        const testRe = /\bvoid\s+(test\w+)\s*\(/g;
        let tm;
        while ((tm = testRe.exec(content)) !== null) {
            // Associate with nearest class above this position
            let className = filename.replace(".java", "");
            for (const cls of classes) {
                if (cls.pos <= tm.index) className = cls.name;
            }
            tests.push({ className, method: tm[1] });
        }
    }
    return tests;
}

function updateRunModes() {
    files[activeFile] = editor.value;
    // Keep the fixed options, rebuild the dynamic ones
    const val = runModeEl.value;
    runModeEl.innerHTML = "";
    ["all", "test", "run"].forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v === "all" ? "Test & Run" : v === "test" ? "Tests Only" : "Run Only";
        runModeEl.appendChild(opt);
    });
    const tests = parseTestMethods();
    if (tests.length > 0) {
        const group = document.createElement("optgroup");
        group.label = "Single Test";
        tests.forEach(t => {
            const opt = document.createElement("option");
            opt.value = "single:" + t.className + "." + t.method;
            opt.textContent = t.className + "." + t.method + "()";
            group.appendChild(opt);
        });
        runModeEl.appendChild(group);
    }
    // Restore selection if it still exists
    if (runModeEl.querySelector(`option[value="${val}"]`)) {
        runModeEl.value = val;
    }
}

// ── Editor ────────────────────────────────────────────────
editor.addEventListener("keydown", function(e) {
    if (e.key === "Tab") {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 4;
    }
});

let saveTimer;
editor.addEventListener("input", () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { autoSave(); updateRunModes(); }, 1000);
});
inputEl.addEventListener("input", () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(autoSave, 1000);
});

document.getElementById("clear-btn").onclick = conClear;

// ── CheerpJ ──────────────────────────────────────────────
// /app/ maps to the web server root, so on GitHub Pages (/kiss/) we need the subpath
const APP = "/app" + new URL(".", window.location.href).pathname;

async function initCheerpJ() {
    statusEl.textContent = "Loading CheerpJ...";
    loadStatusEl.textContent = "Loading CheerpJ runtime (this may take a moment)...";
    try {
        await cheerpjInit({
            version: 8,
            status: "none"
        });
        cjReady = true;
        statusEl.textContent = "Ready";
        loadingEl.classList.add("hidden");
        conWrite("KISS Playground v6. Ready.", "ok");
    } catch(e) {
        statusEl.textContent = "CheerpJ failed to load";
        loadStatusEl.textContent = "Failed to load CheerpJ: " + e.message +
            "\n\nMake sure you're serving this page via HTTP (not file://).";
        conWrite("CheerpJ failed: " + e.message, "err");
        conWrite("Serve via HTTP: python3 -m http.server 8080", "info");
    }
}

// ECJ crashes on second invocation in CheerpJ (stale JVM scanner state).
// Compile once per page load, recompile only by reloading.
// Single test mode uses kiss.util.SingleTest (in kiss.jar) — no extra compilation.
let compiled = false;
let compiledSource = null;
let compileSeq = 0;

async function compileAndRun(mode) {
    if (!cjReady) { conWrite("CheerpJ not ready.", "err"); return; }
    if (running) { conWrite("Already running.", "warn"); return; }

    running = true;
    files[activeFile] = editor.value;
    autoSave();

    const runBtn = document.getElementById("run-btn");
    const stopBtn = document.getElementById("stop-btn");
    runBtn.disabled = true;
    stopBtn.classList.remove("hidden");

    conClear();
    const kissJar = APP + "kiss.jar";
    const ecjJar = APP + "ecj.jar";
    const currentSource = JSON.stringify(files);

    try {
        // Compile if source changed (ECJ can only run once per page load)
        if (currentSource !== compiledSource) {
            if (compiled) {
                conWrite("Source changed. Reloading to recompile...", "warn");
                sessionStorage.setItem("kiss-autorun", mode);
                setTimeout(() => location.reload(), 500);
                return;
            }

            compileSeq++;
            const tag = "_c" + compileSeq;
            statusEl.textContent = "Compiling...";
            conWrite("--- Compiling ---", "info");

            const fileNames = Object.keys(files);
            const srcPaths = [];
            for (const name of fileNames) {
                const path = "/str/" + tag + name;
                cheerpOSAddStringFile(path, files[name]);
                srcPaths.push(path);
            }

            if (inputEl.value) {
                cheerpOSAddStringFile("/str/" + tag + "stdin.txt", inputEl.value);
            }

            capturing = true;
            let compileResult;
            try {
                compileResult = await cheerpjRunMain(
                    "org.eclipse.jdt.internal.compiler.batch.Main",
                    ecjJar + ":" + kissJar,
                    "-cp", kissJar, "-d", "/files/", "-source", "1.8", "-target", "1.8",
                     "-nowarn", ...srcPaths
                );
            } catch(compileErr) {
                capturing = false;
                const msg = compileErr instanceof Error ? compileErr.message
                    : (compileErr && compileErr.toString ? compileErr.toString()
                    : JSON.stringify(compileErr));
                conWrite("Compile error: " + msg, "err");
                _error("Compile exception:", compileErr);
                statusEl.textContent = "Compile error";
                return;
            }
            capturing = false;

            if (compileResult !== 0 && compileResult !== undefined) {
                conWrite("Compilation failed (exit code " + compileResult + ").", "err");
                statusEl.textContent = "Compile error";
                return;
            }

            compiled = true;
            compiledSource = currentSource;
        }

        const modeLabel = mode === "all" ? "Test & Run" : mode === "test" ? "Tests"
            : mode === "run" ? "Run" : mode.substring(7);
        conWrite("--- " + modeLabel + " ---", "info");
        statusEl.textContent = modeLabel + "...";

        // Run with kiss.API — different args per mode, no recompile needed
        let runArgs;
        if (mode === "test") runArgs = ["--norun"];
        else if (mode === "run") runArgs = ["--notest"];
        else if (mode.startsWith("single:")) {
            const parts = mode.substring(7).split(".");
            runArgs = ["--app", "kiss.util.SingleTest", "--notest", "--", parts[0], parts[1]];
        }
        else runArgs = [];
        capturing = true;
        try {
            await cheerpjRunMain(
                "kiss.API",
                kissJar + ":/files/",
                ...runArgs
            );
        } catch(runErr) {
            capturing = false;
            const msg = runErr instanceof Error ? runErr.message
                : (runErr && runErr.toString ? runErr.toString()
                : JSON.stringify(runErr));
            conWrite("Runtime error: " + msg, "err");
            _error("Runtime exception:", runErr);
            statusEl.textContent = "Runtime error";
            return;
        }
        capturing = false;

        conWrite("--- Done ---", "ok");
        statusEl.textContent = "Ready";

    } catch(e) {
        capturing = false;
        const msg = e instanceof Error ? e.message + "\n" + e.stack
            : (e && e.toString ? e.toString() : JSON.stringify(e));
        conWrite("Error: " + msg, "err");
        _error("Uncaught:", e);
        statusEl.textContent = "Error";
    } finally {
        running = false;
        runBtn.disabled = false;
        stopBtn.classList.add("hidden");
    }
}

document.getElementById("run-btn").onclick = () => compileAndRun(runModeEl.value);
document.getElementById("stop-btn").onclick = () => location.reload();

// ── Init ──────────────────────────────────────────────────
populateExamples();
populateSaves();

if (!loadState()) {
    loadExample("Hello World");
}
updateRunModes();

// Load CheerpJ from CDN
const script = document.createElement("script");
script.src = "https://cjrtnc.leaningtech.com/4.2/loader.js";
script.onload = async () => {
    await initCheerpJ();
    // Auto-run after reload (triggered by source-changed recompile)
    const autorun = sessionStorage.getItem("kiss-autorun");
    if (autorun) {
        sessionStorage.removeItem("kiss-autorun");
        runModeEl.value = autorun;
        compileAndRun(autorun);
    }
};
script.onerror = () => {
    loadStatusEl.textContent = "Failed to load CheerpJ script. Check your network connection.";
    statusEl.textContent = "CheerpJ unavailable";
};
document.head.appendChild(script);
</script>
</body>
</html>
